name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: interop
        run: cd interop && go vet ./... && go test ./...
      - name: fuzz smoke
        run: |
          for target in FuzzOpen FuzzOpenPassphrase FuzzSealOpenRoundTrip FuzzBitFlip; do
            go test ./internal/box -run='^$' -fuzz="^${target}\$" -fuzztime=30s
          done
          go test ./xwing -run='^$' -fuzz='^FuzzDecapsulate$' -fuzztime=30s
          go test ./internal/armor -run='^$' -fuzz='^FuzzArmor$' -fuzztime=30s
      - name: timing
        run: SINDOOK_TIMING=1 go test ./xwing -run '^TestDecapsulationTiming$' -count=1 -v
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
