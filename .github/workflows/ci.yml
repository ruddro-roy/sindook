name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: interop
        run: cd interop && go vet ./... && go test ./...
      - name: fuzz smoke
        run: |
          for target in FuzzOpen FuzzOpenPassphrase FuzzSealOpenRoundTrip FuzzBitFlip; do
            go test ./internal/box -run='^$' -fuzz="^${target}\$" -fuzztime=30s
          done
          go test ./xwing -run='^$' -fuzz='^FuzzDecapsulate$' -fuzztime=30s
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
